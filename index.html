<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rabi Kapada Ledger - Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --primary: #000000;
            --text-dark: #111827;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --red: #dc2626;
            --green: #059669;
            --blue: #2563eb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-dark); font-family: -apple-system, sans-serif; margin: 0; padding: 0; line-height: 1.5; -webkit-font-smoothing: antialiased; }

        .svg-icon { width: 20px; height: 20px; stroke-width: 2; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        
        /* PIN SCREEN */
        #pinScreen { position: fixed; inset: 0; background: var(--surface); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;}
        .pin-input { width: 100%; max-width: 300px; font-size: 32px; letter-spacing: 20px; font-weight: 700; text-align: center; border: none; border-bottom: 2px solid var(--border); padding: 10px; margin: 30px 0; outline: none; border-radius: 0; background: transparent;}
        .pin-input:focus { border-bottom-color: var(--primary); }

        /* HEADER */
        .container { max-width: 600px; margin: 0 auto; padding: 0 16px 100px 16px; display: none; }
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 24px 0 16px 0; position: sticky; top: 0; background: var(--bg); z-index: 100; border-bottom: 1px solid var(--border); margin-bottom: 16px;}
        .app-header h1 { font-size: 20px; font-weight: 700; margin: 0; color: var(--text-dark); letter-spacing: -0.5px;}

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 10px 20px 10px; z-index: 1000; }
        .nav-item { border: none; background: transparent; color: var(--text-light); font-size: 11px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px; width: 25%; transition: 0.2s;}
        .nav-item.active { color: var(--blue); }
        .nav-item .svg-icon { width: 24px; height: 24px; }

        /* SECTIONS & CARDS */
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }

        /* INPUTS */
        label { font-size: 12px; font-weight: 600; color: var(--text-light); margin-bottom: 6px; display: block; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 16px; color: var(--text-dark); margin-bottom: 16px; outline: none; transition: 0.2s; -webkit-appearance: none;}
        input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        /* BUTTONS */
        .btn { border: none; border-radius: 8px; padding: 16px; font-weight: 600; font-size: 15px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.1s;}
        .btn:active { opacity: 0.8; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-debt { background: var(--red); color: white; }
        .btn-paid { background: var(--green); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dark); }
        
        /* DIRECTORY LIST */
        .sup-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); cursor: pointer;}
        .sup-row:last-child { border-bottom: none; }
        .sup-name { font-size: 16px; font-weight: 600; color: var(--text-dark); display: block;}
        .sup-meta { font-size: 13px; color: var(--text-light); display: block; margin-top: 2px;}
        .sup-bal { font-weight: 700; font-size: 16px; text-align: right; display: block;}

        /* STATEMENTS */
        #stmtSummaryCard { text-align: center; background: var(--surface); }
        #stmtBalance { font-size: 32px; margin: 8px 0; font-weight: 700;}
        .tx-card { padding: 16px 0; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px;}
        .tx-top { display: flex; justify-content: space-between; align-items: center; }
        .tx-title { font-weight: 600; font-size: 15px; color: var(--text-dark); }
        .tx-amt { font-weight: 700; font-size: 15px; }
        .tx-meta { font-size: 13px; color: var(--text-light); display: flex; justify-content: space-between;}
        
        .tx-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; }
        .btn-text { background: none; border: none; font-size: 13px; font-weight: 600; cursor: pointer; padding: 4px; color: var(--blue);}
        .btn-text.delete { color: var(--red); }

        /* MODALS & TOAST */
        #imageViewer { display: none; position: fixed; inset: 0; background: #000; z-index: 20000; justify-content: center; align-items: center; }
        #imageViewer img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .close-viewer { position: absolute; top: 20px; right: 20px; color: white; cursor: pointer; padding: 10px;}

        #toast { visibility: hidden; position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--text-dark); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; z-index: 3000; }
        #toast.show { visibility: visible; }
        
        /* CLOUD STATUS INDICATOR */
        #cloudStatus { font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px;}
        .status-online { background: #dcfce7; color: #166534; }
        .status-sync { background: #fef9c3; color: #854d0e; }
        .status-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div id="toast">Message</div>

<div id="imageViewer" onclick="this.style.display='none'">
    <div class="close-viewer"><svg class="svg-icon"><path d="M18 6L6 18M6 6l12 12"/></svg></div>
    <img id="fullImage" src="" />
</div>

<div id="pinScreen">
    <h2 id="pinTitle" style="margin:0 0 8px 0; font-size: 24px;">Rabi Kapada</h2>
    <p id="pinDesc" style="color:var(--text-light); margin:0; font-size: 14px;">Enter PIN to decrypt local session</p>
    <input type="password" id="pinInput" class="pin-input" maxlength="4" inputmode="numeric">
    <button class="btn btn-primary" onclick="verifyPin()" style="max-width: 300px;">Unlock</button>
</div>

<div class="container" id="mainApp">
    
    <div class="app-header">
        <h1>Rabi Kapada Ledger</h1>
        <div id="cloudStatus" class="status-sync"><svg class="svg-icon" style="width:12px; height:12px;"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-8.21l-3.23 3.23"/></svg> Connecting...</div>
    </div>

    <div id="entry" class="section active">
        <div class="card">
            <label>SUPPLIER</label>
            <select id="supplierSelect"><option value="" disabled selected>Select a firm...</option></select>
            
            <div style="display: flex; gap: 12px;">
                <div style="flex:1;">
                    <label>AMOUNT (RS)</label>
                    <input type="number" id="amt" placeholder="0.00">
                </div>
                <div style="flex:1;">
                    <label>DATE</label>
                    <input type="date" id="txDate">
                </div>
            </div>
            
            <label>ATTACH RECEIPT (OPTIONAL)</label>
            <input type="file" id="txImage" accept="image/*" capture="environment" style="padding: 10px; border-style: dashed;">
            
            <div style="display: flex; gap: 12px; margin-top: 8px;">
                <button class="btn btn-debt" onclick="processEntry(true, 'Bill')">Add Bill</button>
                <button class="btn btn-paid" onclick="processEntry(false, 'Payment')">Add Payment</button>
            </div>
            <button class="btn btn-outline" style="margin-top: 12px;" onclick="processEntry(true, 'Opening Balance')">Log Past Dues</button>
        </div>
    </div>

    <div id="suppliers" class="section">
        <div class="card" style="border: none; padding: 0; margin-bottom: 24px; background: transparent;">
            <label>NEW FIRM NAME</label>
            <input type="text" id="supName" placeholder="e.g. Shyam Fabrics">
            
            <div style="display: flex; gap: 12px;">
                <div style="flex:1;">
                    <label>CATEGORY</label>
                    <input type="text" id="supCategory" placeholder="e.g. Fabric">
                </div>
                <div style="flex:1;">
                    <label>PHONE</label>
                    <input type="tel" id="supPhone" placeholder="Mobile">
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="addSupplier()">Register Supplier</button>
        </div>
        
        <input type="text" id="searchInput" onkeyup="filterDirectory()" placeholder="Search suppliers..." style="background: white;">
        <div id="supplierList" class="card" style="padding: 0 16px;"></div>
    </div>

    <div id="statements" class="section">
        <div class="card" style="border:none; padding:0; background:transparent;">
            <select id="statementSelect" onchange="generateStatement()"><option value="" disabled selected>Select firm to view Khata...</option></select>
        </div>
        
        <div id="statementContent" style="display:none;">
            <div class="card" id="stmtSummaryCard">
                <label>NET BALANCE</label>
                <h2 id="stmtBalance">Rs. 0</h2>
                <div id="stmtPhoneContainer"></div>
            </div>
            <div class="card" style="padding: 0 16px;" id="statementHistory"></div>
        </div>
    </div>

    <div id="data" class="section">
        <div class="card">
            <h3 style="margin: 0 0 16px 0; font-size: 16px;">Cloud Database</h3>
            <p style="font-size: 13px; color: var(--text-light); margin-bottom: 24px;">Your data is instantly synced to Firebase. No manual backups required, but you can export a CSV for your local records.</p>
            
            <button class="btn btn-primary" onclick="exportToCSV()">Export to Excel</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('entry', this)">
            <svg class="svg-icon"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            Entry
        </button>
        <button class="nav-item" onclick="switchTab('suppliers', this)">
            <svg class="svg-icon"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Firms
        </button>
        <button class="nav-item" onclick="switchTab('statements', this)">
            <svg class="svg-icon"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Khata
        </button>
        <button class="nav-item" onclick="switchTab('data', this)">
            <svg class="svg-icon"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            Data
        </button>
    </div>
</div>

<script>
    // ====================================================================
    // YOUR SECURE FIREBASE CONFIGURATION (DO NOT SHARE PUBLICLY)
    // ====================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyADlEGFdU0t7pAMvOrZTWgpAFUkbPWm7R0",
      authDomain: "kapada-6283b.firebaseapp.com",
      projectId: "kapada-6283b",
      storageBucket: "kapada-6283b.firebasestorage.app",
      messagingSenderId: "25954227994",
      appId: "1:25954227994:web:b162c3e5f46055dd59bea3"
    };
    // ====================================================================

    let db;
    let suppliers = [];
    let txs = [];
    let savedPin = localStorage.getItem('v30_pin');

    // --- SECURITY ---
    if (!savedPin) { document.getElementById('pinTitle').innerText = "Create PIN"; }
    function verifyPin() {
        const val = document.getElementById('pinInput').value;
        if (!savedPin) { 
            if(val.length !== 4) return alert("PIN must be exactly 4 digits");
            localStorage.setItem('v30_pin', val); savedPin = val; startApp(); 
        }
        else if (val === savedPin) { startApp(); }
        else { document.getElementById('pinInput').value = ''; }
    }

    function setCloudStatus(status, msg) {
        const el = document.getElementById('cloudStatus');
        el.className = 'status-' + status;
        if(status === 'online') el.innerHTML = `<svg class="svg-icon" style="width:12px; height:12px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${msg}`;
        else if(status === 'error') el.innerHTML = `⚠️ ${msg}`;
        else el.innerHTML = `⏳ ${msg}`;
    }

    function startApp() { 
        document.getElementById('pinScreen').style.display = 'none'; 
        document.getElementById('mainApp').style.display = 'block'; 

        // Initialize Cloud Database
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        db = firebase.firestore();

        // REAL-TIME SYNC: Listeners constantly grab fresh data from the cloud
        db.collection("suppliers").onSnapshot((snapshot) => {
            suppliers = [];
            snapshot.forEach(doc => suppliers.push(doc.data()));
            renderUI();
            setCloudStatus('online', 'Live');
        }, (error) => {
            console.error(error);
            setCloudStatus('error', 'Sync Failed (Check DB Rules)');
        });

        db.collection("txs").onSnapshot((snapshot) => {
            txs = [];
            snapshot.forEach(doc => txs.push(doc.data()));
            txs.sort((a, b) => b.id.localeCompare(a.id)); // Sort newest first
            renderUI();
            if(document.getElementById('statementSelect').value) generateStatement();
        });
    }

    // --- CLOUD WRITE FUNCTIONS ---
    function saveToCloud(collection, data) {
        setCloudStatus('sync', 'Saving...');
        db.collection(collection).doc(data.id).set(data)
            .then(() => setCloudStatus('online', 'Saved'))
            .catch(err => { setCloudStatus('error', 'Save Failed'); alert(err.message); });
    }

    function deleteFromCloud(collection, id) {
        setCloudStatus('sync', 'Deleting...');
        db.collection(collection).doc(id).delete()
            .then(() => setCloudStatus('online', 'Live'))
            .catch(err => setCloudStatus('error', 'Delete Failed'));
    }

    // --- UI LOGIC ---
    function renderUI() {
        document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
        const s1 = document.getElementById('supplierSelect'), s2 = document.getElementById('statementSelect');
        const currentS1 = s1.value, currentS2 = s2.value; // Keep current selection
        
        s1.innerHTML = '<option value="" disabled selected>Select a firm...</option>'; 
        s2.innerHTML = '<option value="" disabled selected>Select a firm...</option>';
        const list = document.getElementById('supplierList'); list.innerHTML = '';
        
        suppliers.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
            let bal = txs.filter(t => t.supId === s.id).reduce((acc, t) => t.isDebt ? acc + t.val : acc - t.val, 0);
            s1.innerHTML += `<option value="${s.id}">${s.name}</option>`; 
            s2.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            
            list.innerHTML += `
                <div class="sup-row" onclick="jumpToStmt('${s.id}')">
                    <div>
                        <span class="sup-name">${s.name}</span>
                        <span class="sup-meta">${s.category || 'Vendor'}</span>
                    </div>
                    <span class="sup-bal" style="color:${bal>0?'var(--red)':'var(--green)'}">Rs. ${bal.toLocaleString('en-IN', {minimumFractionDigits: 2})}</span>
                </div>`;
        });
        
        if (currentS1) s1.value = currentS1;
        if (currentS2) s2.value = currentS2;
    }

    function switchTab(id, btn) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); if(btn) btn.classList.add('active'); if(id === 'statements') generateStatement(); }
    function jumpToStmt(id) { document.getElementById('statementSelect').value = id; switchTab('statements', document.querySelectorAll('.nav-item')[2]); }

    function addSupplier() {
        const name = document.getElementById('supName').value.trim(); if (!name) return showToast("Firm name required");
        const newSup = { id: "SUP_" + Date.now().toString(), name, category: document.getElementById('supCategory').value, phone: document.getElementById('supPhone').value };
        saveToCloud("suppliers", newSup); 
        document.getElementById('supName').value = ''; document.getElementById('supCategory').value = ''; document.getElementById('supPhone').value = '';
    }

    function processEntry(isDebt, type) {
        const f = document.getElementById('txImage').files[0];
        if (f) {
            const reader = new FileReader(); reader.readAsDataURL(f);
            reader.onload = e => { const img = new Image(); img.src = e.target.result; img.onload = () => { const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); const scale = 800 / img.width; canvas.width = 800; canvas.height = img.height * scale; ctx.drawImage(img, 0, 0, 800, canvas.height); saveRecord(isDebt, type, canvas.toDataURL('image/jpeg', 0.6)); }; };
        } else saveRecord(isDebt, type, null);
    }

    function saveRecord(isDebt, type, img) {
        const id = document.getElementById('supplierSelect').value; const val = parseFloat(document.getElementById('amt').value);
        if (!id || isNaN(val)) return showToast("Please enter an amount");
        const newTx = { id: Date.now().toString(), supId: id, val, isDebt, type: type, date: document.getElementById('txDate').value, img };
        saveToCloud("txs", newTx); 
        document.getElementById('amt').value = ''; document.getElementById('txImage').value = '';
    }

    function deleteTx(id) { if(confirm("Permanently delete this transaction from the cloud?")) deleteFromCloud("txs", id); }
    function openImage(src) { document.getElementById('fullImage').src = src; document.getElementById('imageViewer').style.display = 'flex'; }

    function generateStatement() {
        const id = document.getElementById('statementSelect').value; const cont = document.getElementById('statementContent');
        if (!id) { cont.style.display = 'none'; return; }
        
        cont.style.display = 'block'; const s = suppliers.find(x => x.id === id);
        let sTxsAll = txs.filter(t => t.supId === id).sort((a, b) => new Date(a.date) - new Date(b.date));
        
        let currentRunBal = 0; 
        sTxsAll.forEach(t => { currentRunBal += t.isDebt ? t.val : -t.val; t.runBal = currentRunBal; });
        sTxsAll.reverse(); // Newest first

        document.getElementById('stmtBalance').innerText = "Rs. " + currentRunBal.toLocaleString('en-IN', {minimumFractionDigits: 2});
        
        const phoneCont = document.getElementById('stmtPhoneContainer');
        if (s.phone) { phoneCont.innerHTML = `<a href="tel:${s.phone}" style="color:var(--blue); font-size:14px; font-weight:600; text-decoration:none;">📞 Call ${s.name}</a>`; } else { phoneCont.innerHTML = ''; }

        const hist = document.getElementById('statementHistory'); hist.innerHTML = '';
        
        sTxsAll.forEach(t => {
            let title = t.type || (t.isDebt ? 'Bill' : 'Payment');
            hist.innerHTML += `
                <div class="tx-card">
                    <div class="tx-top">
                        <span class="tx-title">${title}</span>
                        <span class="tx-amt" style="color:${t.isDebt?'var(--red)':'var(--green)'}">Rs. ${t.val.toLocaleString('en-IN')}</span>
                    </div>
                    <div class="tx-meta">
                        <span>${t.date}</span>
                        <span>Bal: Rs. ${t.runBal.toLocaleString('en-IN')}</span>
                    </div>
                    ${t.img ? `<img src="${t.img}" onclick="openImage(this.src)" style="width:100px; border-radius:8px; margin-top:8px; border: 1px solid var(--border); cursor: zoom-in;">` : ''}
                    <div class="tx-actions">
                        <button class="btn-text delete" onclick="deleteTx('${t.id}')">Delete</button>
                    </div>
                </div>`;
        });
    }

    function filterDirectory() { const q = document.getElementById('searchInput').value.toLowerCase(); document.querySelectorAll('#supplierList .sup-row').forEach(c => { c.style.display = c.innerText.toLowerCase().includes(q) ? 'flex' : 'none'; }); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500); }

    function exportToCSV() {
        if (txs.length === 0 && suppliers.length === 0) return showToast("No data to export");
        let csv = "Date,Firm Name,Category,Phone,Transaction Type,Amount\n";
        txs.forEach(t => { let sup = suppliers.find(s => s.id === t.supId) || {}; let txType = t.type || (t.isDebt ? 'Bill' : 'Payment'); csv += `${t.date},${sup.name || 'Unknown'},${sup.category || ''},${sup.phone || ''},${txType},${t.val}\n`; });
        const encodedUri = encodeURI("data:text/csv;charset=utf-8," + csv);
        const a = document.createElement('a'); a.href = encodedUri; a.download = "Rabi_Kapada_Ledger_Backup.csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
</script>
</body>
</html>
