<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rabi Kapada - Cloud Storage</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        :root {
            --bg-deep: #020617;
            --surface: #0f172a;
            --surface-elevated: #1e293b;
            --border: rgba(255, 255, 255, 0.08);
            
            --primary-glow: linear-gradient(135deg, #38bdf8, #3b82f6);
            --debt-glow: linear-gradient(135deg, #fb7185, #e11d48);
            --paid-glow: linear-gradient(135deg, #34d399, #059669);
            --ob-glow: linear-gradient(135deg, #94a3b8, #475569);
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --accent-blue: #38bdf8;
            --accent-red: #fb7185;
            --accent-green: #34d399;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; padding: 0; line-height: 1.5; -webkit-font-smoothing: antialiased; }

        .svg-icon { width: 20px; height: 20px; stroke-width: 2.2; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; stroke-width: 2; }

        .container { max-width: 600px; margin: 0 auto; padding: 0 16px 120px 16px; display: none; }
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 16px; position: sticky; top: 0; background: rgba(2, 6, 23, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid var(--border); margin: 0 -16px 20px -16px;}
        .app-header h1 { font-size: 22px; font-weight: 900; margin: 0; background: var(--primary-glow); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;}

        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; max-width: 560px; margin: 0 auto; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-radius: 30px; border: 1px solid var(--border); display: flex; justify-content: space-around; padding: 8px; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.5);}
        .nav-item { border: none; background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 8px; width: 25%; transition: 0.3s; border-radius: 20px;}
        .nav-item.active { background: rgba(56, 189, 248, 0.1); color: var(--accent-blue); }

        .section { display: none; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px; margin-bottom: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        .floating-input { position: relative; margin-bottom: 16px; }
        .floating-input input, .floating-input select {
            width: 100%; padding: 22px 16px 8px 16px; border-radius: 16px;
            border: 2px solid transparent; background: var(--surface-elevated);
            font-size: 16px; font-weight: 700; color: var(--text-main);
            outline: none; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit; -webkit-appearance: none;
        }
        .floating-input label {
            position: absolute; left: 16px; top: 18px; font-size: 14px;
            color: var(--text-muted); font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none;
        }
        .floating-input input:focus, .floating-input select:focus { border-color: var(--accent-blue); background: rgba(56,189,248,0.05); box-shadow: 0 0 0 4px rgba(56,189,248,0.1); }
        .floating-input input:focus ~ label, .floating-input input:not(:placeholder-shown) ~ label,
        .floating-input select:focus ~ label, .floating-input select:valid ~ label { top: 6px; font-size: 10px; color: var(--accent-blue); }
        .floating-input input[type="date"] ~ label { top: 6px; font-size: 10px; color: var(--accent-blue); }

        .btn { border: none; border-radius: 100px; padding: 18px; font-weight: 800; font-size: 15px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3);}
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary-glow); color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.2);}
        .btn-debt { background: var(--debt-glow); color: white; }
        .btn-paid { background: var(--paid-glow); color: white; }
        .btn-ob { background: var(--ob-glow); color: white; margin-top: 5px; }
        .btn-contact { background: rgba(56, 189, 248, 0.1); color: var(--accent-blue); border: 1px solid rgba(56,189,248,0.2); padding: 8px 14px; border-radius: 100px; font-size: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 20px;}

        .sup-card { display: flex; flex-direction: column; gap: 12px; cursor: pointer; border-bottom: 1px solid var(--border); padding: 20px 0;}
        .sup-card:last-child { border-bottom: none; padding-bottom: 0;}
        .sup-row { display: flex; justify-content: space-between; align-items: center; }
        .sup-info { display: flex; align-items: center; gap: 14px; }
        .avatar { width: 46px; height: 46px; border-radius: 23px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: 800; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.2); }
        .sup-name { font-size: 16px; font-weight: 800; color: var(--text-main); display: block;}
        .sup-meta { font-size: 13px; color: var(--text-muted); font-weight: 600; display: block;}
        .sup-bal { font-weight: 900; font-size: 16px; text-align: right; display: block;}
        .btn-call-tiny { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); padding: 8px 16px; border-radius: 100px; font-size: 13px; font-weight: 800; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 6px; margin-top: 6px;}
        .btn-edit-firm { background: rgba(56,189,248,0.1); color: var(--accent-blue); border: 1px solid rgba(56,189,248,0.3); }

        #stmtSummaryCard { background: var(--primary-glow); border: none; text-align: center; box-shadow: 0 15px 35px rgba(56, 189, 248, 0.25);}
        #stmtSummaryCard label { color: rgba(255,255,255,0.8); font-weight: 800;}
        #stmtBalance { font-size: 38px; margin: 10px 0; font-weight: 900; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.2);}
        
        .tx-card { background: var(--surface-elevated); border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); border-left-width: 6px; }
        .tx-title { font-weight: 800; font-size: 15px; color: var(--text-main); }
        .tx-meta { font-size: 13px; color: var(--text-muted); margin: 6px 0; font-weight: 600;}
        .tx-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
        .btn-icon-tiny { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-muted); font-size: 14px; padding: 8px 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .btn-icon-tiny.delete { color: var(--accent-red); }
        .btn-icon-tiny.edit { color: var(--accent-blue); }

        #cloudStatus { font-size: 11px; font-weight: 800; padding: 6px 12px; border-radius: 100px; display: inline-flex; align-items: center; gap: 6px; letter-spacing: 0.5px;}
        .status-online { background: rgba(52, 211, 153, 0.15); color: var(--accent-green); border: 1px solid rgba(52, 211, 153, 0.3);}
        .status-sync { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3);}
        .status-error { background: rgba(251, 113, 133, 0.15); color: var(--accent-red); border: 1px solid rgba(251, 113, 133, 0.3);}

        /* MODALS */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 15000; justify-content: center; align-items: center; padding: 20px;}
        .edit-card { background: var(--surface); border: 1px solid var(--border); padding: 24px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);}

        #pinScreen { position: fixed; inset: 0; background: var(--bg-deep); z-index: 25000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;}
        .pin-input { width: 100%; max-width: 320px; font-size: 36px; letter-spacing: 24px; font-weight: 900; text-align: center; border: none; border-bottom: 2px solid var(--border); padding: 12px; margin: 40px 0; outline: none; background: transparent; color: var(--text-main); transition: 0.3s;}
        .pin-input:focus { border-bottom-color: var(--accent-blue); box-shadow: 0 10px 20px -10px rgba(56,189,248,0.3);}
        
        #imageViewer { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 30000; justify-content: center; align-items: center;}
        #imageViewer img { max-width: 95%; max-height: 90%; border-radius: 16px; object-fit: contain; }
        .close-viewer { position: absolute; top: 30px; right: 30px; color: white; cursor: pointer; background: rgba(255,255,255,0.1); width: 48px; height: 48px; border-radius: 24px; display: flex; align-items: center; justify-content: center;}

        #toast { visibility: hidden; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--surface-elevated); color: var(--text-main); padding: 14px 28px; border-radius: 100px; font-size: 14px; font-weight: 800; z-index: 30000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border); white-space: nowrap; }
        #toast.show { visibility: visible; animation: dropDown 2.5s; }
        @keyframes dropDown { 0%, 100% { transform: translateX(-50%) translateY(-20px); opacity: 0; } 15%, 85% { transform: translateX(-50%) translateY(0); opacity: 1; } }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-state svg { width: 64px; height: 64px; stroke: var(--text-muted); margin-bottom: 16px; opacity: 0.5;}
    </style>
</head>
<body>

<div id="toast">Message</div>

<div id="imageViewer" onclick="this.style.display='none'">
    <div class="close-viewer"><svg class="svg-icon"><path d="M18 6L6 18M6 6l12 12"/></svg></div>
    <img id="fullImage" src="" />
</div>

<div id="editTxModalOverlay" class="modal-overlay">
    <div class="edit-card">
        <h3 style="margin:0 0 20px 0; color:var(--text-main); font-weight: 900; font-size: 20px;">Edit Transaction</h3>
        
        <div class="floating-input">
            <select id="editSupId" required></select>
            <label>Transfer to Firm</label>
        </div>
        
        <div class="floating-input">
            <select id="editType" required>
                <option value="Bill">Bill</option>
                <option value="Payment">Payment</option>
                <option value="Opening Balance">Opening Balance</option>
            </select>
            <label>Transaction Type</label>
        </div>
        
        <div class="floating-input">
            <input type="number" id="editAmt" placeholder=" " required>
            <label>Amount (Rs)</label>
        </div>
        
        <div class="floating-input">
            <input type="date" id="editDate" required>
            <label>Date</label>
        </div>
        
        <label style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block;">Update Photo (Optional)</label>
        <input type="file" id="editTxImage" accept="image/*" capture="environment" style="width: 100%; background: var(--surface-elevated); border: 2px dashed var(--border); padding: 12px; border-radius: 12px; color: var(--text-muted); margin-bottom: 24px; cursor: pointer;">
        
        <input type="hidden" id="editTxId">
        <input type="hidden" id="editTxOldImg">
        
        <div style="display:flex; gap:12px;">
            <button class="btn" style="background:var(--surface-elevated); color:var(--text-main); border:1px solid var(--border);" onclick="closeEditTxModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveTxEdit()">Save Changes</button>
        </div>
    </div>
</div>

<div id="editFirmModalOverlay" class="modal-overlay">
    <div class="edit-card">
        <h3 style="margin:0 0 20px 0; color:var(--text-main); font-weight: 900; font-size: 20px;">Edit Firm Profile</h3>
        
        <div class="floating-input">
            <input type="text" id="editFirmName" placeholder=" " required>
            <label>Firm Name</label>
        </div>
        
        <div class="floating-input">
            <input type="text" id="editFirmCategory" placeholder=" ">
            <label>Category</label>
        </div>
        
        <div class="floating-input">
            <input type="tel" id="editFirmPhone" placeholder=" ">
            <label>Phone Number</label>
        </div>
        
        <input type="hidden" id="editFirmId">
        
        <div style="display:flex; gap:12px;">
            <button class="btn" style="background:var(--surface-elevated); color:var(--text-main); border:1px solid var(--border);" onclick="closeEditFirmModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveFirmEdit()">Update Firm</button>
        </div>
    </div>
</div>

<div id="pinScreen">
    <div style="width: 72px; height: 72px; background: rgba(56,189,248,0.1); color: var(--accent-blue); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
        <svg class="svg-icon" style="width: 36px; height: 36px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2 style="margin:0 0 8px 0; font-size: 28px; font-weight: 900; background: var(--primary-glow); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Rabi Kapada</h2>
    <p style="color:var(--text-muted); margin:0; font-size: 14px; font-weight: 600;">Encrypted Local Session</p>
    <input type="password" id="pinInput" class="pin-input" maxlength="4" inputmode="numeric">
    <button class="btn btn-primary" onclick="verifyPin()" style="max-width: 320px;">Unlock Vault</button>
</div>

<div class="container" id="mainApp">
    
    <div class="app-header">
        <h1>Payable Ledger</h1>
        <div id="cloudStatus" class="status-sync">⏳ Syncing...</div>
    </div>

    <div id="entry" class="section active">
        <div class="card">
            <div class="floating-input">
                <select id="supplierSelect" required><option value="" disabled selected></option></select>
                <label>Select Firm</label>
            </div>
            
            <div style="display: flex; gap: 12px;">
                <div class="floating-input" style="flex:1;">
                    <input type="number" id="amt" placeholder=" " required>
                    <label>Amount (Rs)</label>
                </div>
                <div class="floating-input" style="flex:1;">
                    <input type="date" id="txDate" required>
                    <label>Date</label>
                </div>
            </div>
            
            <label style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.5px;">Paper Receipt (Optional)</label>
            <input type="file" id="txImage" accept="image/*" capture="environment" style="width: 100%; background: var(--surface-elevated); border: 2px dashed var(--border); padding: 16px; border-radius: 16px; color: var(--text-muted); margin-bottom: 24px; cursor: pointer; font-weight: 600;">
            
            <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                <button class="btn btn-debt" onclick="processEntry(true, 'Bill')">
                    <svg class="svg-icon"><path d="M12 5v14M5 12h14"/></svg> Add Bill
                </button>
                <button class="btn btn-paid" onclick="processEntry(false, 'Payment')">
                    <svg class="svg-icon"><path d="M5 12h14"/></svg> Add Payment
                </button>
            </div>
            <button class="btn btn-ob" onclick="processEntry(true, 'Opening Balance')">Log Past Dues</button>
        </div>
    </div>

    <div id="suppliers" class="section">
        <div class="card">
            <button class="btn-contact" onclick="importContact()">
                <svg class="svg-icon" style="width:16px; height:16px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Import from Address Book
            </button>
            
            <div class="floating-input">
                <input type="text" id="supName" placeholder=" " required>
                <label>New Firm Name</label>
            </div>
            <div class="floating-input">
                <input type="text" id="supCategory" placeholder=" ">
                <label>Category (Optional)</label>
            </div>
            <div class="floating-input">
                <input type="tel" id="supPhone" placeholder=" ">
                <label>Phone Number</label>
            </div>
            
            <button class="btn btn-primary" onclick="addSupplier()">Register Supplier</button>
        </div>
        
        <div class="floating-input" style="margin-bottom: 8px;">
            <input type="text" id="searchInput" onkeyup="filterDirectory()" placeholder=" " style="border-radius: 100px; padding-left: 20px;">
            <label style="left: 20px;">🔍 Search Suppliers...</label>
        </div>
        
        <div id="supplierList" class="card" style="padding: 0 24px;"></div>
    </div>

    <div id="statements" class="section">
        <div class="card">
            <div class="floating-input" style="margin-bottom:0;">
                <select id="statementSelect" onchange="generateStatement()" required><option value="" disabled selected></option></select>
                <label>View Khata For</label>
            </div>
        </div>
        
        <div id="statementContent" style="display:none;">
            <div class="card" id="stmtSummaryCard">
                <label>NET OUTSTANDING DEBT</label>
                <h2 id="stmtBalance">Rs. 0</h2>
                <div id="stmtPhoneContainer" style="margin-top: 16px; display: flex; justify-content: center; gap: 8px;"></div>
            </div>
            <div id="statementHistory"></div>
        </div>
    </div>

    <div id="data" class="section">
        <div class="card">
            <div style="width: 56px; height: 56px; background: rgba(56,189,248,0.1); color: var(--accent-blue); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
                <svg class="svg-icon" style="width: 28px; height: 28px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            </div>
            <h3 style="margin: 0 0 8px 0; font-size: 20px; font-weight: 900;">Cloud Secured</h3>
            <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 24px; font-weight: 500;">Your ledger is actively syncing to the Mumbai server. You can export a hard copy for your accountant below.</p>
            
            <button class="btn btn-primary" onclick="exportToCSV()">Export to Excel (CSV)</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('entry', this)">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            Entry
        </button>
        <button class="nav-item" onclick="switchTab('suppliers', this)">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Firms
        </button>
        <button class="nav-item" onclick="switchTab('statements', this)">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Khata
        </button>
        <button class="nav-item" onclick="switchTab('data', this)">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            Data
        </button>
    </div>
</div>

<script>
    // ====================================================================
    // YOUR FIREBASE CONFIGURATION
    // ====================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyADlEGFdU0t7pAMvOrZTWgpAFUkbPWm7R0",
      authDomain: "kapada-6283b.firebaseapp.com",
      projectId: "kapada-6283b",
      storageBucket: "kapada-6283b.firebasestorage.app",
      messagingSenderId: "25954227994",
      appId: "1:25954227994:web:b162c3e5f46055dd59bea3"
    };

    let db;
    let storage;
    let suppliers = [];
    let txs = [];
    let savedPin = localStorage.getItem('v33_pin');
    
    const AVATAR_COLORS = ['linear-gradient(135deg, #f43f5e, #be123c)', 'linear-gradient(135deg, #f97316, #c2410c)', 'linear-gradient(135deg, #eab308, #a16207)', 'linear-gradient(135deg, #10b981, #047857)', 'linear-gradient(135deg, #0ea5e9, #0369a1)', 'linear-gradient(135deg, #8b5cf6, #6d28d9)', 'linear-gradient(135deg, #d946ef, #a21caf)'];
    function getAvatarColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
    }

    const EMPTY_FIRMS = `<div class="empty-state"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><h3 style="color:var(--text-main); font-weight:800; margin:0 0 8px 0; font-size:18px;">No Firms Yet</h3><p style="margin:0; font-weight:600; font-size:14px;">Register a supplier above.</p></div>`;
    const EMPTY_TXS = `<div class="empty-state"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg><h3 style="color:var(--text-main); font-weight:800; margin:0 0 8px 0; font-size:18px;">Clean Khata</h3><p style="margin:0; font-weight:600; font-size:14px;">No bills or payments logged yet.</p></div>`;

    // --- SECURITY ---
    if (!savedPin) { document.getElementById('pinTitle').innerText = "Create PIN"; }
    function verifyPin() {
        const val = document.getElementById('pinInput').value;
        if (!savedPin) { 
            if(val.length !== 4) return alert("PIN must be exactly 4 digits");
            localStorage.setItem('v33_pin', val); savedPin = val; startApp(); 
        }
        else if (val === savedPin) { startApp(); }
        else { document.getElementById('pinInput').value = ''; }
    }

    function setCloudStatus(status, msg) {
        const el = document.getElementById('cloudStatus');
        el.className = 'status-' + status;
        if(status === 'online') el.innerHTML = `<svg class="svg-icon" style="width:14px; height:14px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${msg}`;
        else if(status === 'error') el.innerHTML = `⚠️ ${msg}`;
        else el.innerHTML = `⏳ ${msg}`;
    }

    function startApp() { 
        document.getElementById('pinScreen').style.display = 'none'; 
        document.getElementById('mainApp').style.display = 'block'; 

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        db = firebase.firestore();
        storage = firebase.storage(); // Initialize Firebase Storage

        db.collection("suppliers").onSnapshot((snapshot) => {
            suppliers = [];
            snapshot.forEach(doc => suppliers.push(doc.data()));
            renderUI();
            setCloudStatus('online', 'Live');
            if(document.getElementById('statementSelect').value) generateStatement();
        }, (error) => { setCloudStatus('error', 'Sync Failed'); });

        db.collection("txs").onSnapshot((snapshot) => {
            txs = [];
            snapshot.forEach(doc => txs.push(doc.data()));
            txs.sort((a, b) => b.id.localeCompare(a.id)); 
            renderUI();
            if(document.getElementById('statementSelect').value) generateStatement();
        });
    }

    function saveToCloud(collection, data) {
        setCloudStatus('sync', 'Saving Data...');
        db.collection(collection).doc(data.id).set(data).then(() => setCloudStatus('online', 'Live')).catch(err => setCloudStatus('error', 'Error'));
    }

    function deleteFromCloud(collection, id) {
        setCloudStatus('sync', 'Deleting...');
        db.collection(collection).doc(id).delete().then(() => setCloudStatus('online', 'Live')).catch(err => setCloudStatus('error', 'Error'));
    }

    // --- CONTACT API ---
    async function importContact() {
        if (!('contacts' in navigator && 'ContactsManager' in window)) return showToast("Contact import not supported on this browser.");
        try { 
            const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: false }); 
            if (contacts && contacts.length > 0) { 
                if (contacts[0].name) document.getElementById('supName').value = contacts[0].name[0]; 
                if (contacts[0].tel) document.getElementById('supPhone').value = contacts[0].tel[0].replace(/[\s-]/g, ''); 
                document.getElementById('supName').focus();
                document.getElementById('supPhone').focus();
                document.getElementById('supCategory').focus();
            } 
        } catch (ex) { showToast("Could not access contacts."); }
    }

    function renderUI() {
        document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
        const s1 = document.getElementById('supplierSelect'), s2 = document.getElementById('statementSelect'), s3 = document.getElementById('editSupId');
        const currentS1 = s1.value, currentS2 = s2.value; 
        
        s1.innerHTML = '<option value="" disabled selected></option>'; 
        s2.innerHTML = '<option value="" disabled selected></option>';
        s3.innerHTML = '';
        const list = document.getElementById('supplierList'); list.innerHTML = '';
        
        if (suppliers.length === 0) {
            list.innerHTML = EMPTY_FIRMS;
        } else {
            suppliers.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
                let bal = txs.filter(t => t.supId === s.id).reduce((acc, t) => t.isDebt ? acc + t.val : acc - t.val, 0);
                s1.innerHTML += `<option value="${s.id}">${s.name}</option>`; 
                s2.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                s3.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                
                const initial = s.name.charAt(0).toUpperCase();
                const avatarColor = getAvatarColor(s.name);
                
                list.innerHTML += `
                    <div class="sup-card" onclick="jumpToStmt('${s.id}')">
                        <div class="sup-row">
                            <div class="sup-info">
                                <div class="avatar" style="background:${avatarColor}">${initial}</div>
                                <div>
                                    <span class="sup-name">${s.name}</span>
                                    <span class="sup-meta">${s.category || 'Vendor'}</span>
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <span class="sup-bal" style="color:${bal>0?'var(--accent-red)':'var(--accent-green)'}">Rs. ${bal.toLocaleString('en-IN', {minimumFractionDigits: 2})}</span>
                            </div>
                        </div>
                    </div>`;
            });
        }
        
        if (currentS1) s1.value = currentS1;
        if (currentS2) s2.value = currentS2;
    }

    function switchTab(id, btn) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); if(btn) btn.classList.add('active'); if(id === 'statements') generateStatement(); }
    function jumpToStmt(id) { document.getElementById('statementSelect').value = id; switchTab('statements', document.querySelectorAll('.nav-item')[2]); }

    // --- FIRM CRUD ---
    function addSupplier() {
        const name = document.getElementById('supName').value.trim(); if (!name) return showToast("Firm name required");
        const newSup = { id: "SUP_" + Date.now().toString(), name, category: document.getElementById('supCategory').value, phone: document.getElementById('supPhone').value };
        saveToCloud("suppliers", newSup); 
        document.getElementById('supName').value = ''; document.getElementById('supCategory').value = ''; document.getElementById('supPhone').value = ''; showToast("Firm Registered");
    }

    function openEditFirmModal(id) {
        const s = suppliers.find(x => x.id === id); if(!s) return;
        document.getElementById('editFirmId').value = s.id;
        document.getElementById('editFirmName').value = s.name;
        document.getElementById('editFirmCategory').value = s.category || "";
        document.getElementById('editFirmPhone').value = s.phone || "";
        
        document.getElementById('editFirmName').focus(); document.getElementById('editFirmName').blur();
        document.getElementById('editFirmCategory').focus(); document.getElementById('editFirmCategory').blur();
        document.getElementById('editFirmPhone').focus(); document.getElementById('editFirmPhone').blur();
        
        document.getElementById('editFirmModalOverlay').style.display = 'flex';
    }
    
    function closeEditFirmModal() { document.getElementById('editFirmModalOverlay').style.display = 'none'; }
    
    function saveFirmEdit() {
        const id = document.getElementById('editFirmId').value;
        const name = document.getElementById('editFirmName').value.trim();
        if(!name) return showToast("Name is required");
        
        const updatedSup = {
            id: id, name: name,
            category: document.getElementById('editFirmCategory').value,
            phone: document.getElementById('editFirmPhone').value
        };
        
        saveToCloud("suppliers", updatedSup);
        closeEditFirmModal();
        showToast("Firm Updated");
    }

    // --- CLOUD STORAGE & TRANSACTION CRUD ---
    function processEntry(isDebt, type) {
        const id = document.getElementById('supplierSelect').value; 
        const val = parseFloat(document.getElementById('amt').value);
        if (!id || isNaN(val)) return showToast("Please enter an amount");
        
        const f = document.getElementById('txImage').files[0];
        if (f) {
            showToast("Compressing photo...");
            const reader = new FileReader(); reader.readAsDataURL(f);
            reader.onload = e => { 
                const img = new Image(); img.src = e.target.result; 
                img.onload = () => { 
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); 
                    const scale = 800 / img.width; canvas.width = 800; canvas.height = img.height * scale; 
                    ctx.drawImage(img, 0, 0, 800, canvas.height); 
                    
                    // Convert canvas to blob for Cloud Storage
                    canvas.toBlob((blob) => {
                        uploadImageToStorageAndSave(blob, id, val, isDebt, type);
                    }, 'image/jpeg', 0.6);
                }; 
            };
        } else {
            saveRecord(id, val, isDebt, type, null);
        }
    }

    function uploadImageToStorageAndSave(blob, supId, val, isDebt, type) {
        const fileName = "receipts/IMG_" + Date.now() + ".jpg";
        const storageRef = storage.ref(fileName);
        const uploadTask = storageRef.put(blob);

        uploadTask.on('state_changed', 
            (snapshot) => { setCloudStatus('sync', 'Uploading Photo...'); },
            (error) => { setCloudStatus('error', 'Upload Failed'); showToast("Photo upload failed"); },
            () => {
                uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                    saveRecord(supId, val, isDebt, type, downloadURL);
                });
            }
        );
    }

    function saveRecord(supId, val, isDebt, type, imgUrl) {
        const newTx = { id: Date.now().toString(), supId: supId, val: val, isDebt: isDebt, type: type, date: document.getElementById('txDate').value, img: imgUrl };
        saveToCloud("txs", newTx); 
        document.getElementById('amt').value = ''; document.getElementById('txImage').value = ''; showToast(type + " Saved");
    }

    function openEditTxModal(id) {
        const tx = txs.find(t => t.id === id); if(!tx) return;
        document.getElementById('editTxId').value = tx.id;
        document.getElementById('editSupId').value = tx.supId;
        document.getElementById('editAmt').value = tx.val;
        document.getElementById('editDate').value = tx.date;
        document.getElementById('editType').value = tx.type || (tx.isDebt ? 'Bill' : 'Payment');
        document.getElementById('editTxOldImg').value = tx.img || "";
        document.getElementById('editTxImage').value = ''; 
        
        document.getElementById('editAmt').focus(); document.getElementById('editAmt').blur();
        document.getElementById('editDate').focus(); document.getElementById('editDate').blur();
        
        document.getElementById('editTxModalOverlay').style.display = 'flex';
    }

    function closeEditTxModal() { document.getElementById('editTxModalOverlay').style.display = 'none'; }

    function saveTxEdit() {
        const id = document.getElementById('editTxId').value;
        const supId = document.getElementById('editSupId').value;
        const amt = parseFloat(document.getElementById('editAmt').value);
        const date = document.getElementById('editDate').value;
        const type = document.getElementById('editType').value;
        const isDebt = (type === 'Bill' || type === 'Opening Balance');
        const oldImgUrl = document.getElementById('editTxOldImg').value;
        
        if(isNaN(amt) || amt <= 0 || !supId) return showToast("Invalid inputs");

        const f = document.getElementById('editTxImage').files[0];
        if(f) {
            showToast("Processing new photo...");
            const reader = new FileReader(); reader.readAsDataURL(f);
            reader.onload = e => { 
                const img = new Image(); img.src = e.target.result; 
                img.onload = () => { 
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); 
                    const scale = 800 / img.width; canvas.width = 800; canvas.height = img.height * scale; 
                    ctx.drawImage(img, 0, 0, 800, canvas.height); 
                    
                    canvas.toBlob((blob) => {
                        const fileName = "receipts/IMG_" + Date.now() + ".jpg";
                        const uploadTask = storage.ref(fileName).put(blob);
                        uploadTask.on('state_changed', 
                            () => { setCloudStatus('sync', 'Uploading Photo...'); },
                            (err) => { showToast("Upload failed"); },
                            () => {
                                uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                                    finalizeTxSave(id, supId, amt, isDebt, type, date, downloadURL); 
                                });
                            }
                        );
                    }, 'image/jpeg', 0.6);
                }; 
            };
        } else {
            finalizeTxSave(id, supId, amt, isDebt, type, date, oldImgUrl === "" ? null : oldImgUrl);
        }
    }

    function finalizeTxSave(id, supId, val, isDebt, type, date, imgUrl) {
        const updatedTx = { id, supId, val, isDebt, type, date, img: imgUrl };
        saveToCloud("txs", updatedTx);
        closeEditTxModal();
        showToast("Transaction Updated");
    }

    function deleteTx(id) { if(confirm("Permanently delete this transaction from the cloud?")) deleteFromCloud("txs", id); }
    function openImage(src) { document.getElementById('fullImage').src = src; document.getElementById('imageViewer').style.display = 'flex'; }

    function generateStatement() {
        const id = document.getElementById('statementSelect').value; const cont = document.getElementById('statementContent');
        if (!id) { cont.style.display = 'none'; return; }
        
        cont.style.display = 'block'; const s = suppliers.find(x => x.id === id);
        let sTxsAll = txs.filter(t => t.supId === id).sort((a, b) => new Date(a.date) - new Date(b.date));
        
        let currentRunBal = 0; 
        sTxsAll.forEach(t => { currentRunBal += t.isDebt ? t.val : -t.val; t.runBal = currentRunBal; });
        sTxsAll.reverse();

        document.getElementById('stmtBalance').innerText = "Rs. " + currentRunBal.toLocaleString('en-IN', {minimumFractionDigits: 2});
        
        const phoneCont = document.getElementById('stmtPhoneContainer');
        let actionBtns = '';
        if (s.phone) { actionBtns += `<a href="tel:${s.phone}" class="btn-call-tiny">📞 Call</a>`; }
        actionBtns += `<button onclick="openEditFirmModal('${s.id}')" class="btn-call-tiny btn-edit-firm">✏️ Edit Firm</button>`;
        phoneCont.innerHTML = actionBtns;

        const hist = document.getElementById('statementHistory'); hist.innerHTML = '';
        
        if (sTxsAll.length === 0) {
            hist.innerHTML = EMPTY_TXS;
        } else {
            sTxsAll.forEach(t => {
                let title = t.type || (t.isDebt ? 'Bill' : 'Payment');
                hist.innerHTML += `
                    <div class="tx-card" style="border-left-color: ${t.isDebt?'var(--accent-red)':'var(--accent-green)'};">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="tx-title">${title}</span>
                            <span style="font-weight:900; font-size:17px; color:${t.isDebt?'var(--accent-red)':'var(--accent-green)'}">Rs. ${t.val.toLocaleString('en-IN')}</span>
                        </div>
                        <div class="tx-meta">
                            <span>${t.date}</span>
                            <span style="color:var(--accent-blue); font-weight:800;">Bal: Rs. ${t.runBal.toLocaleString('en-IN')}</span>
                        </div>
                        ${t.img ? `<img src="${t.img}" onclick="openImage(this.src)" style="width:100%; max-width: 140px; border-radius:12px; margin-top:8px; border: 1px solid var(--border); cursor: zoom-in;">` : ''}
                        <div class="tx-actions">
                            <button class="btn-icon-tiny edit" onclick="openEditTxModal('${t.id}')"><svg class="svg-icon" style="width:16px;height:16px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                            <button class="btn-icon-tiny delete" onclick="deleteTx('${t.id}')"><svg class="svg-icon" style="width:16px;height:16px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
                        </div>
                    </div>`;
            });
        }
    }

    function filterDirectory() { const q = document.getElementById('searchInput').value.toLowerCase(); document.querySelectorAll('#supplierList .sup-card').forEach(c => { c.style.display = c.innerText.toLowerCase().includes(q) ? 'flex' : 'none'; }); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500); }

    function exportToCSV() {
        if (txs.length === 0 && suppliers.length === 0) return showToast("No data to export");
        let csv = "Date,Firm Name,Category,Phone,Transaction Type,Amount\n";
        txs.forEach(t => { let sup = suppliers.find(s => s.id === t.supId) || {}; let txType = t.type || (t.isDebt ? 'Bill' : 'Payment'); csv += `${t.date},${sup.name || 'Unknown'},${sup.category || ''},${sup.phone || ''},${txType},${t.val}\n`; });
        const encodedUri = encodeURI("data:text/csv;charset=utf-8," + csv);
        const a = document.createElement('a'); a.href = encodedUri; a.download = "Rabi_Kapada_Ledger_Backup.csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
</script>
